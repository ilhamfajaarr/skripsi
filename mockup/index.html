<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieRec - Homepage Mockup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">Sistem MovieRec</a>
            <div class="nav-links">
                <a href="index.html">Beranda</a>
                <a href="recommendations.html">Rekomendasi</a>
                <a href="analysis.html">Analisis</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="text-center">
            <h1>Sistem Rekomendasi Film</h1>
            <p>Berdasarkan Content-Based Filtering untuk Tugas Akhir</p>
        </section>

        <section class="section mt-20">
            <h2>Cari Film Favorit</h2>
            <div class="form-group">
                <label for="movie-search">Cari Judul Film</label>
                <input type="text" id="movie-search" placeholder="Ketik judul film, misal: Inception, The Dark Knight...">
            </div>
            
            <div id="selected-movies" class="form-group">
                <label>Film yang Dipilih:</label>
                <div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));">
                    <div class="movie-card" style="padding: 10px; font-size: 0.8rem; text-align: center;">
                        <span>Inception (2010)</span>
                        <button class="btn-secondary" style="padding: 2px 5px; font-size: 0.7rem; margin-top: 5px;">Hapus</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>Filter Berdasarkan Atribut</h2>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div class="form-group">
                    <label for="genre">Genre</label>
                    <select id="genre">
                        <option value="">Pilih Genre</option>
                        <option value="action">Action</option>
                        <option value="drama">Drama</option>
                        <option value="sci-fi">Sci-Fi</option>
                        <option value="thriller">Thriller</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="director">Sutradara</label>
                    <input type="text" id="director" placeholder="Nama Sutradara">
                </div>
                <div class="form-group">
                    <label for="cast">Pemeran (Cast)</label>
                    <input type="text" id="cast" placeholder="Nama Aktor/Aktris">
                </div>
            </div>
        </section>

        <section class="text-center">
            <button onclick="location.href='recommendations.html'">Dapatkan Rekomendasi</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
